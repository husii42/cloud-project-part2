{% extends "base.html" %}
{% block title %}Upload – Cloud Storage App{% endblock %}
{% block content %}
  <a class="top-link" href="{{ url_for('index') }}">← Back to files</a>
  <div class="card">
    <h2>Upload a file</h2>
    <p class="subtitle">Images, PDFs and text files up to 25 MB</p>

    <form method="post" enctype="multipart/form-data">
      <input type="file" name="file" required>
      <button type="submit" class="btn">Upload</button>
    </form>
  </div>
{% endblock %}
